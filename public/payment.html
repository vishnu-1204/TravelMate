<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TravelMate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f7f9; }
        .payment-card { border: 2px solid #f3f4f6; transition: all 0.2s; cursor: pointer; position: relative; }
        .payment-card:hover { border-color: #e5e7eb; }
        .payment-card.active { border-color: #fca5a5; }
        .payment-card.active .radio-dot { background-color: #f87171; border-color: #f87171; }
        .radio-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #e5e7eb; transition: all 0.2s; }
        .btn-confirm { background-color: #0b4ea5; transition: background-color 0.2s; }
        .btn-confirm:hover { background-color: #093d81; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-4xl shadow-sm rounded-none border border-slate-100 overflow-hidden">

        <div class="p-12">
            <h2 class="hidden">Select Payment Method</h2>
            
            <!-- Payment Methods Grid -->
            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="payment-card p-4 rounded-md flex items-center justify-between" onclick="selectMethod(this)">
                    <div class="radio-dot"></div>
                    <svg viewBox="0 0 24 24" class="h-8"><path fill="#EB001B" d="M15.5 12c0 2.1-1.1 3.9-2.7 5-1.1.7-2.3 1-3.6 1-3.3 0-6-2.7-6-6s2.7-6 6-6c1.3 0 2.5.4 3.6 1 1.6 1.1 2.7 2.9 2.7 5z"/><path fill="#F79E1B" d="M20.8 12c0 3.3-2.7 6-6 6-1.3 0-2.5-.4-3.6-1 1.6-1.1 2.7-2.9 2.7-5s-1.1-3.9-2.7-5c1.1-.7 2.3-1 3.6-1 3.3 0 6 2.7 6 6z"/><path fill="#FF5F00" d="M14.8 12c0-2.1-1.1-3.9-2.7-5-1.1.7-2.3 1-3.6 1 1.6 1.1 2.7 2.9 2.7 5s-1.1 3.9-2.7 5c1.1.7 2.3 1 3.6 1 1.6-1.1 2.7-2.9 2.7-5z"/></svg>
                    <div class="w-4"></div>
                </div>
                <div class="payment-card active p-4 rounded-md flex items-center justify-between" onclick="selectMethod(this)">
                    <div class="radio-dot border-red-400 bg-red-400"></div>
                    <svg viewBox="0 0 48 48" class="h-6"><path fill="#1A1F71" d="M21 16.3h-4.3l-2.7 13.1h4.3l2.7-13.1z"/><path fill="#1A1F71" d="M36.1 16.5c-0.7-0.3-1.8-0.6-3.1-0.6-3.4 0-5.8 1.8-5.8 4.4 0 1.9 1.7 3 3 3.6 1.3 0.6 1.8 1.1 1.8 1.6 0 0.9-1.1 1.3-2 1.3-1.4 0-2.1-0.2-3.3-0.7l-0.5-0.2-0.5 3.3c0.9 0.4 2.6 0.8 4.4 0.8 3.7 0 6.1-1.8 6.1-4.6 0-1.5-0.9-2.7-2.9-3.7-1.2-0.6-2-1.1-2-1.7 0-0.6 0.8-1.2 1.9-1.2 1.1 0 1.9 0.2 2.6 0.5l0.3 0.1 0.7-3.4z"/><path fill="#1A1F71" d="M12.4 16.3l-4 10.7-0.4-2.1c-0.7-2.3-2.8-4.8-5.2-6.1l3.3 12.5h4.6l6.8-16.3h-5.1z"/><path fill="#1A1F71" d="M44.7 16.3h-3.4c-1.1 0-1.9 0.3-2.3 1.4l-6.6 15.6h4.5l0.9-2.5h5.5l0.5 2.5h4l-3.5-17.1zm-4.3 10l1.7-4.6 1 4.6h-2.7z"/></svg>
                    <div class="w-4"></div>
                </div>
            </div>

            <form id="payment-form" class="space-y-6" autocomplete="off">
                <!-- Row 1 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2">Card number *</label>
                        <input type="text" id="card-number" required maxlength="19" placeholder="1234 5678 9012 3456" autocomplete="off"
                               class="w-full px-3 py-2 border border-slate-200 focus:ring-0 focus:border-slate-400 outline-none transition-all text-sm font-medium text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2">Cardholder *</label>
                        <input type="text" id="card-name" required placeholder="John Doe" autocomplete="off"
                               class="w-full px-3 py-2 border border-slate-200 focus:ring-0 focus:border-slate-400 outline-none transition-all text-sm font-medium text-slate-700">
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2">Expiry date *</label>
                            <select id="exp-month" required class="w-full px-3 py-2 border border-slate-200 focus:ring-0 focus:border-slate-400 outline-none text-sm text-slate-600 appearance-none bg-no-repeat bg-[right_10px_center]">
                                <option value="" disabled selected>Month</option>
                                <option>01</option><option>02</option><option>03</option><option>04</option><option>05</option><option>06</option>
                                <option>07</option><option>08</option><option>09</option><option>10</option><option>11</option><option>12</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2 invisible">Year</label>
                            <select id="exp-year" required class="w-full px-3 py-2 border border-slate-200 focus:ring-0 focus:border-slate-400 outline-none text-sm text-slate-600 appearance-none bg-no-repeat bg-[right_10px_center]">
                                <option value="" disabled selected>Year</option>
                                <option>2024</option><option>2025</option><option>2026</option><option>2027</option><option>2028</option><option>2029</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 relative">
                        <div class="flex-grow">
                            <label class="block text-[11px] font-bold text-slate-500 uppercase mb-2">CVC</label>
                            <input type="password" id="card-cvv" required maxlength="3" placeholder="123" autocomplete="new-password"
                                   class="w-full px-3 py-2 border border-slate-200 focus:ring-0 focus:border-slate-400 outline-none text-sm text-slate-700">
                        </div>
                        <div class="text-slate-300 cursor-help mb-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="flex items-center pt-2">
                    <input type="checkbox" id="save-details" class="w-4 h-4 text-emerald-500 border-slate-300 rounded focus:ring-transparent">
                    <label for="save-details" class="ml-2 text-[11px] text-slate-500 font-medium">Save my details for future purchases</label>
                </div>

                <!-- Summary Table -->
                <div class="mt-12 bg-slate-50 border-t border-b border-slate-100 divide-y divide-slate-100">
                    <div class="py-4 px-6 flex justify-between items-center text-[12px]">
                        <span class="text-slate-500 font-medium">Subtotal (<span id="summary-package">Package</span>)</span>
                        <span id="summary-price" class="text-slate-700 font-bold">₹0</span>
                    </div>
                    <div class="py-5 px-6 flex justify-between items-center text-[13px] bg-white">
                        <span class="text-slate-800 font-bold uppercase tracking-wider">Total Amount</span>
                        <span id="total-price" class="text-slate-800 font-bold">₹0</span>
                    </div>
                </div>

                <div id="error-message" class="hidden text-red-500 text-[11px] font-bold text-center uppercase tracking-wider mt-4"></div>

                <button type="submit" id="submit-btn" 
                        class="w-full btn-confirm text-white font-bold py-4 px-6 uppercase tracking-widest text-[13px] shadow-sm transform transition-all active:scale-[0.99] flex items-center justify-center gap-3">
                    Confirm Payment
                </button>
            </form>

            <div id="success-message" class="hidden text-center py-20">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-500 mx-auto mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">Thank you!</h3>
                <p class="text-slate-500 text-sm mb-8">Your booking is confirmed. We've sent details to your email.</p>
                <a href="/" class="inline-block px-8 py-3 bg-slate-800 text-white font-bold text-[12px] uppercase tracking-wider">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pkgName = params.get('package') || 'Trip';
        const priceValue = parseInt(params.get('price') || '0');
        const userEmail = params.get('email') || '';
        const bid = params.get('bookingId') || 'TM-' + Math.random().toString(36).substr(2, 6).toUpperCase();

        document.getElementById('summary-package').textContent = pkgName;
        document.getElementById('summary-price').textContent = '₹' + priceValue.toLocaleString('en-IN');
        document.getElementById('total-price').textContent = '₹' + priceValue.toLocaleString('en-IN');

        function selectMethod(el) {
            document.querySelectorAll('.payment-card').forEach(c => {
                c.classList.remove('active');
                c.querySelector('.radio-dot').style.backgroundColor = 'transparent';
                c.querySelector('.radio-dot').style.borderColor = '#e5e7eb';
            });
            el.classList.add('active');
            el.querySelector('.radio-dot').style.backgroundColor = '#f87171';
            el.querySelector('.radio-dot').style.borderColor = '#f87171';
        }

        const form = document.getElementById('payment-form');
        const btn = document.getElementById('submit-btn');
        const err = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.classList.add('hidden');
            
            const num = document.getElementById('card-number').value.replace(/\s/g, '');
            if(num.length !== 16) {
                err.textContent = "Please enter a valid 16-digit card number";
                err.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> Processing';

            await new Promise(r => setTimeout(r, 2000));

            try {
                const response = await fetch('http://localhost:3001/api/booking/simulate-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        package: pkgName,
                        amount: priceValue,
                        email: userEmail,
                        bookingId: bid,
                        customerName: document.getElementById('card-name').value
                    })
                });

                if (response.ok) {
                    form.classList.add('hidden');
                    document.getElementById('success-message').classList.remove('hidden');
                } else {
                    const data = await response.json();
                    err.textContent = data.message || "Something went wrong";
                    err.classList.remove('hidden');
                    resetBtn();
                }
            } catch (fail) {
                err.textContent = "Service unavailable. Try again.";
                err.classList.remove('hidden');
                resetBtn();
            }
        });

        function resetBtn() {
            btn.disabled = false;
            btn.textContent = "Confirm Payment";
        }

        // Format card number
        document.getElementById('card-number').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '').substring(0, 16);
            if (v.length > 0) v = v.match(/.{1,4}/g).join(' ');
            e.target.value = v;
        });
    </script>
</body>
</html>
